<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CV Prep | ButterCup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ButterCup</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>
    <div class="container" style="display: grid; grid-template-columns: 1fr 350px; gap: 2rem;">
        <div>
            <h2>Build Your Foundation</h2>
            <div class="card" style="margin-top: 1rem;">
                <label style="display:block; margin-bottom: 1rem;">
                    <strong>Professional Summary</strong>
                    <textarea style="width:100%; padding:10px; margin-top:5px; border-radius:10px; border:1px solid var(--secondary);"></textarea>
                </label>
                <label style="display:block; margin-bottom: 1rem;">
                    <strong>Your Experience</strong>
                    <input type="text" placeholder="Title/Role" style="width:100%; padding:10px; margin-top:5px; border-radius:10px; border:1px solid var(--secondary);">
                </label>
                <button class="btn btn-primary">Save for Review</button>
            </div>
        </div>
        <aside class="sister-sidebar">
            <div style="text-align: center; margin-bottom: 1rem;">
                <span style="font-size: 2.5rem;">👩🏻</span>
                <h4>Big Sister</h4>
            </div>
            <div class="chat-bubble">"No CV? No problem, gorgeous! Even small roles show your strength. Let's list your skills together."</div>
        </aside>
    </div>
</body>
</html>
